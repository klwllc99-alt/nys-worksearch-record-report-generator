apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: nys-ws5-generator
  annotations:
    run.googleapis.com/ingress: all
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "0"
        autoscaling.knative.dev/maxScale: "3"
        run.googleapis.com/cpu-throttling: "true"
    spec:
      serviceAccountName: SERVICE_ACCOUNT_PLACEHOLDER
      containers:
        - name: api
          image: APP_IMAGE_PLACEHOLDER
          ports:
            - containerPort: 8080
          env:
            - name: ALLOWED_ORIGINS
              value: https://APP_DOMAIN_PLACEHOLDER
            - name: GOOGLE_CLOUD_PROJECT
              value: PROJECT_ID_PLACEHOLDER
            - name: DEFAULT_ADMIN_EMAIL
              valueFrom:
                secretKeyRef:
                  name: nys-ws5-admin-email
                  key: latest
            - name: DEFAULT_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: nys-ws5-admin-password
                  key: latest
            - name: METRICS_RETENTION_DAYS
              value: "30"
            - name: METRICS_STORAGE_BACKEND
              value: firestore
            - name: FIRESTORE_METRICS_COLLECTION
              value: nys_ws5_metrics_daily
          resources:
            limits:
              memory: 512Mi
              cpu: "1"
